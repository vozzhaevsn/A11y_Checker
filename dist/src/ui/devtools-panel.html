<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>A11y Checker – DevTools</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 8px;
      background-color: #f7fafc;
    }
    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    button {
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid #cbd5f5;
      background: #3182ce;
      color: white;
      font-size: 12px;
      cursor: pointer;
    }
    button:hover {
      background: #2b6cb0;
    }
    .results-container {
      flex: 1;
      overflow-y: auto;
      background: #fff;
      border-radius: 4px;
      border: 1px solid #e2e8f0;
      padding: 8px;
      font-size: 12px;
    }
    .result-item {
      padding: 6px 4px;
      border-bottom: 1px solid #edf2f7;
    }
    .result-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2px;
      font-weight: 600;
    }
    .critical { color: #e53e3e; }
    .serious { color: #dd6b20; }
    .moderate { color: #d69e2e; }
    .minor { color: #38a169; }

    .element-tag {
      background-color: #edf2f7;
      padding: 1px 4px;
      border-radius: 4px;
      font-family: monospace;
    }
    .status-bar {
      margin-top: 6px;
      padding: 4px 6px;
      background-color: #edf2f7;
      border-radius: 4px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="controls">
      <button id="scan-btn">Run Accessibility Scan</button>
      <button id="export-btn">Export JSON</button>
      <button id="clear-btn">Clear</button>
    </div>

    <div class="results-container" id="results-container">
      <p>No scan results yet. Click "Run Accessibility Scan".</p>
    </div>

    <div class="status-bar" id="status-bar">
      Ready
    </div>
  </div>

  <script src="devtools-panel.js"></script>
</body>
</html>
